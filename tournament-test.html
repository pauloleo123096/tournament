<!DOCTYPE html>
<html>
<head>
    <title>LVLUP Tournament Test</title>
    <style>
        body { font-family: sans-serif; padding: 40px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; font-weight: bold; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</head>
<body>
    <h1>Tournament Database Test</h1>
    <p>Tap the gear icon in the corner to open your console!</p>
    
    <button id="startMatchBtn">Send Match to Database</button>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

      // Hardcoded straight quotes to prevent tablet keyboard issues
      const firebaseConfig = {
        apiKey: "AIzaSyC7n0itej-hIh4M4pGQBs-QQrML-f-sNwM",
        authDomain: "lvlupgames-backend.firebaseapp.com",
        projectId: "lvlupgames-backend",
        storageBucket: "lvlupgames-backend.firebasestorage.app",
        messagingSenderId: "1033906369662",
        appId: "1:1033906369662:web:847dc1d8d649340d74142f"
      };

      try {
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        console.log("Firebase is wired up and ready!");

        document.getElementById("startMatchBtn").addEventListener("click", async () => {
          console.log("Button tapped! Sending data to Firestore...");
          
          try {
            await setDoc(doc(db, "matches", "grand_finals"), {
              player1: "LeeYawn",
              player2: "Mica",
              game: "The Witcher 3",
              score_p1: 0,
              score_p2: 0,
              status: "in-progress"
            });
            alert("SUCCESS! Check the Firebase Console!");
            console.log("Data successfully written to database.");
          } catch (error) {
            alert("DATABASE REJECTED IT: " + error.message);
            console.error("Firebase Error:", error);
          }
        });
      } catch (e) {
        console.error("Critical Setup Error:", e);
      }
    </script>
</body>
</html>
