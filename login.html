<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVLUP | Captain's Portal</title>
    <style>
        :root { --bg: #0a0f16; --panel: #131c28; --accent: #00ffcc; --text: #f8fafc; --muted: #64748b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 20px; box-sizing: border-box;}
        .auth-box { background: var(--panel); padding: 40px; border-radius: 12px; border: 1px solid #1e293b; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h2 { margin-top: 0; color: var(--accent); margin-bottom: 5px; font-size: 28px;}
        .helper-text { color: var(--muted); font-size: 15px; margin-bottom: 40px; line-height: 1.5; }
        
        /* Premium Google Button */
        .btn-google { width: 100%; padding: 15px; background: white; color: #000; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px;}
        .btn-google:hover { background: #f1f5f9; transform: translateY(-2px); }
        .btn-google img { width: 20px; height: 20px; }
        
        .back-link { display: block; margin-top: 25px; color: var(--muted); text-decoration: none; font-size: 14px;}
        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>

    <div class="auth-box">
        <h2 id="formTitle">Captain's Portal</h2>
        <div class="helper-text">Authenticate your identity to manage active MLBB rosters and access the tournament network.</div>
        
        <button id="googleLoginBtn" class="btn-google">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continue with Google
        </button>

        <div id="errMsg" style="color: #ef4444; margin-top: 15px; font-size: 14px; font-weight:bold;"></div>
        <a href="index.html" class="back-link">Return to Home Base</a>
    </div>

    <script type="module">
        import { db, auth } from './firebase-setup.js';
        // NEW: Imported GoogleAuthProvider and signInWithPopup
        import { GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const urlId = urlParams.get('id');

        onAuthStateChanged(auth, (user) => { 
            if (user) {
                // Instantly redirects logged-in users to the right place
                window.location.replace(urlId ? `register.html?id=${urlId}` : "dashboard.html");
            } 
        });

        const provider = new GoogleAuthProvider();
        const msg = document.getElementById('errMsg');
        const btn = document.getElementById('googleLoginBtn');

        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.style.opacity = "0.7";
            msg.innerText = "";

            try {
                // 1. Launch Google Login Popup
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // 2. Save or update their profile in your database
                // { merge: true } ensures we don't accidentally overwrite an Admin's role if they log in!
                await setDoc(doc(db, "users", user.uid), { 
                    email: user.email, 
                    name: user.displayName || "Captain", 
                    role: "captain", // By default, everyone is a captain. {merge: true} protects your admin status.
                    lastLogin: new Date().toISOString()
                }, { merge: true });

            } catch (e) { 
                btn.disabled = false;
                btn.style.opacity = "1";
                msg.innerText = "Error: " + e.message.replace("Firebase: ", ""); 
            }
        });
    </script>
</body>
</html>
