<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVLUP | Captain's Portal</title>
    <style>
        :root { --bg: #0a0f16; --panel: #131c28; --accent: #00ffcc; --text: #f8fafc; --muted: #64748b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .auth-box { background: var(--panel); padding: 40px; border-radius: 12px; border: 1px solid #1e293b; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: var(--accent); text-align: center; margin-bottom: 30px;}
        input { width: 100%; padding: 12px; margin-bottom: 20px; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box;}
        button { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 15px;}
        button:hover { background: #00ccaa; }
        .toggle-text { text-align: center; color: var(--muted); font-size: 14px; }
        .toggle-text a { color: var(--accent); cursor: pointer; text-decoration: none; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--muted); text-decoration: none; font-size: 14px;}
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-box">
        <div id="mainForm">
            <h2 id="formTitle">Captain Login</h2>
            <input type="text" id="name" placeholder="Captain Name" class="hidden">
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button id="authBtn">Enter Portal</button>
            <div class="toggle-text">
                <span id="toggleHint">No squad yet?</span> <a id="toggleLink">Register here</a><br><br>
                <a id="forgotLink" style="font-size: 13px; color: var(--muted); text-decoration: underline;">Forgot Password?</a>
            </div>
        </div>

        <div id="resetForm" class="hidden">
            <h2>Reset Protocol</h2>
            <p style="font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 20px;">Enter your email to receive a recovery link.</p>
            <input type="email" id="resetEmail" placeholder="Email Address">
            <button id="sendResetBtn">Send Recovery Link</button>
            <div class="toggle-text"><a id="backToLogin">← Back to Login</a></div>
        </div>

        <div id="errMsg" style="color: #ef4444; margin-top: 15px; text-align: center; font-size: 14px;"></div>
        <a href="index.html" class="back-link">Return to Basecamp</a>
    </div>

    <script type="module">
        import { db, auth } from './firebase-setup.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Prevent logged-in users from seeing login page
        onAuthStateChanged(auth, (user) => { if (user) window.location.replace("dashboard.html"); });

        let isLogin = true;
        const msg = document.getElementById('errMsg');

        // UI Toggles
        document.getElementById('toggleLink').addEventListener('click', () => {
            isLogin = !isLogin;
            document.getElementById('formTitle').innerText = isLogin ? "Captain Login" : "Register Profile";
            document.getElementById('authBtn').innerText = isLogin ? "Enter Portal" : "Create Profile";
            document.getElementById('name').classList.toggle('hidden', isLogin);
            document.getElementById('toggleHint').innerText = isLogin ? "No squad yet?" : "Already registered?";
            document.getElementById('toggleLink').innerText = isLogin ? "Register here" : "Login here";
            document.getElementById('forgotLink').classList.toggle('hidden', !isLogin);
            msg.innerText = "";
        });

        document.getElementById('forgotLink').addEventListener('click', () => {
            document.getElementById('mainForm').classList.add('hidden');
            document.getElementById('resetForm').classList.remove('hidden');
            msg.innerText = "";
        });

        document.getElementById('backToLogin').addEventListener('click', () => {
            document.getElementById('resetForm').classList.add('hidden');
            document.getElementById('mainForm').classList.remove('hidden');
            msg.innerText = "";
        });

        // Authentication Execution
        document.getElementById('authBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            if (!email || !pass) return msg.innerText = "Provide credentials.";

            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    if (!name) return msg.innerText = "Name required for registration.";
                    const creds = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", creds.user.uid), { email, name, role: "captain", createdAt: new Date().toISOString() });
                }
            } catch (e) { msg.innerText = "Error: " + e.message; }
        });

        // Password Reset Execution
        document.getElementById('sendResetBtn').addEventListener('click', async () => {
            const email = document.getElementById('resetEmail').value;
            if(!email) return msg.innerText = "Provide email address.";
            try {
                await sendPasswordResetEmail(auth, email);
                msg.style.color = "var(--accent)";
                msg.innerText = "Recovery email sent. Check your inbox.";
            } catch(e) { msg.style.color = "#ef4444"; msg.innerText = "Error: " + e.message; }
        });
    </script>
</body>
</html>
