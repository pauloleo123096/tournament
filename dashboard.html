<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVLUP | Captain's Dashboard</title>
    <style>
        :root { --bg: #0a0f16; --panel: #131c28; --accent: #00ffcc; --text: #f8fafc; --muted: #64748b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        nav { background: #05080c; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .logo { font-size: 24px; font-weight: bold; color: var(--accent); text-decoration: none; letter-spacing: 2px; }
        .btn-logout { background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: 0.2s; font-weight: bold;}
        .btn-logout:hover { background: #ef4444; color: white; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: none; } /* Hidden until auth check */
        .panel { background: var(--panel); padding: 30px; border-radius: 12px; border: 1px solid #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">LVLUP</a>
        <div style="display: flex; gap: 15px; align-items: center;">
            <span id="userGreeting" style="color: var(--muted); font-weight: bold;"></span>
            <a href="nexus-7x9q.html" id="adminLink" style="display: none; color: var(--accent); font-weight: bold; text-decoration: none;">Nexus Access</a>
            <button class="btn-logout" id="logoutBtn">Disengage</button>
        </div>
    </nav>

    <div class="container" id="dashboardContent">
        <div class="panel">
            <h1 style="margin-top: 0; color: var(--accent);">Operational Hub</h1>
            <p style="color: var(--muted);">Phase 3 Target: Team Management and Roster editing will be constructed here.</p>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './firebase-setup.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Show content
                document.getElementById('dashboardContent').style.display = "block";
                
                // Fetch profile data
                const profile = await getDoc(doc(db, "users", user.uid));
                if(profile.exists()) {
                    const data = profile.data();
                    document.getElementById('userGreeting').innerText = `Welcome, ${data.name}`;
                    // If Admin, show the Nexus link
                    if(data.role === "admin") { document.getElementById('adminLink').style.display = "inline-block"; }
                }
            } else {
                // Kick to login
                window.location.replace("login.html");
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.replace("index.html"));
        });
    </script>
</body>
</html>
