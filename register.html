<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVLUP | Team Registration</title>
    <style>
        :root { 
            --lvlup-bg: #0a0f16; --lvlup-panel: #131c28; 
            --lvlup-accent: #00ffcc; --lvlup-text: #f8fafc; 
            --lvlup-text-muted: #64748b; 
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--lvlup-bg); color: var(--lvlup-text); margin: 0; padding: 40px 20px; }
        
        .form-container { max-width: 600px; margin: 0 auto; background: var(--lvlup-panel); padding: 40px; border-radius: 12px; border-top: 4px solid var(--lvlup-accent); box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: none; }
        .form-container h2 { margin-top: 0; font-size: 32px; margin-bottom: 5px; }
        .subtitle { color: var(--lvlup-text-muted); margin-bottom: 20px; font-size: 16px; }
        
        /* New Target Banner Styling */
        .target-banner { background: #0f172a; border-left: 4px solid var(--lvlup-accent); padding: 12px 15px; border-radius: 4px; margin-bottom: 30px; }
        .target-banner span { color: var(--lvlup-text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 3px; }
        .target-banner strong { font-size: 18px; color: var(--lvlup-text); }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #cbd5e1; font-weight: bold; }
        .input-group input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #1e293b; color: white; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .input-group input:focus { outline: none; border-color: var(--lvlup-accent); }
        
        .roster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .submit-btn { width: 100%; padding: 16px; background: var(--lvlup-accent); color: #000; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .submit-btn:hover { background: #00ccaa; }
    </style>
</head>
<body>

    <div class="form-container" id="registrationForm">
        <h2>Enroll Squad</h2>
        <div class="subtitle">Enter your official MLBB roster details below.</div>

        <div class="target-banner" id="targetBanner">
            <span>Registering For:</span>
            <strong id="targetEventName">Loading Event Data...</strong>
        </div>

        <div class="input-group">
            <label>Team Name</label>
            <input type="text" id="teamName" placeholder="e.g. Blacklist International">
        </div>

        <div class="input-group">
            <label>Captain IGN (In-Game Name)</label>
            <input type="text" id="captainIGN" placeholder="Player 1 (Captain)">
        </div>

        <label style="display: block; margin-bottom: 8px; color: #cbd5e1; font-weight: bold; margin-top: 30px;">Starting Roster</label>
        <div class="roster-grid">
            <div class="input-group"><input type="text" id="player2" placeholder="Player 2 IGN"></div>
            <div class="input-group"><input type="text" id="player3" placeholder="Player 3 IGN"></div>
            <div class="input-group"><input type="text" id="player4" placeholder="Player 4 IGN"></div>
            <div class="input-group"><input type="text" id="player5" placeholder="Player 5 IGN"></div>
        </div>

        <button id="submitTeamBtn" class="submit-btn">Submit Registration</button>
        <a href="dashboard.html" style="display: block; text-align: center; color: var(--lvlup-text-muted); text-decoration: none; margin-top: 20px; font-size: 14px;">Cancel & Return to Dashboard</a>
    </div>

    <script type="module">
        import { db, auth } from './firebase-setup.js';
        // NEW: Imported doc and getDoc to fetch tournament info
        import { collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        let currentUserId = null;
        let targetTourneyId = "general";
        let targetTourneyName = "General Open Roster";

        // URL Parser: Check if an ID was passed in the link
        const urlParams = new URLSearchParams(window.location.search);
        const urlId = urlParams.get('id');

        // Fetch Tournament Data if an ID exists
        async function fetchTargetTournament() {
            if (urlId) {
                targetTourneyId = urlId;
                try {
                    const tSnap = await getDoc(doc(db, "tournaments", urlId));
                    if (tSnap.exists()) {
                        targetTourneyName = tSnap.data().title;
                    } else {
                        targetTourneyName = "Unknown Event (ID not found)";
                    }
                } catch (e) {
                    console.error("Error fetching tournament:", e);
                    targetTourneyName = "Error loading event data";
                }
            }
            document.getElementById('targetEventName').innerText = targetTourneyName;
        }

        // Ensure only logged-in users see the form
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                document.getElementById('registrationForm').style.display = "block";
                fetchTargetTournament(); // Load the banner text
            } else {
                // If they are not logged in, pass the target ID to the login page so it isn't lost!
                const redirectParams = urlId ? `?id=${urlId}` : '';
                window.location.href = `login.html${redirectParams}`;
            }
        });

        document.getElementById('submitTeamBtn').addEventListener('click', async () => {
            const tName = document.getElementById('teamName').value;
            const capIGN = document.getElementById('captainIGN').value;
            
            if (!tName || !capIGN) {
                alert("Team Name and Captain IGN are required!");
                return;
            }

            // Button Loading State
            const btn = document.getElementById('submitTeamBtn');
            btn.innerText = "Encrypting Data...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "teams"), {
                    ownerUid: currentUserId, 
                    tournamentId: targetTourneyId,     // NEW: Binds to the specific event
                    tournamentName: targetTourneyName, // NEW: Saves the name for easy dashboard viewing
                    teamName: tName,
                    captain: capIGN,
                    roster: [
                        document.getElementById('player2').value,
                        document.getElementById('player3').value,
                        document.getElementById('player4').value,
                        document.getElementById('player5').value
                    ],
                    wins: 0,
                    losses: 0,
                    status: "Pending Review", // Updated to reflect a realistic tournament flow
                    createdAt: new Date().toISOString()
                });

                alert("Squad successfully registered!");
                window.location.href = "dashboard.html"; 
                
            } catch (error) {
                alert("DATABASE ERROR: " + error.message);
                console.error(error);
                btn.innerText = "Submit Registration";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
