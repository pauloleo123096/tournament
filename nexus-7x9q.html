<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVLUP | Nexus Control</title>
    <style>
        :root { 
            --lvlup-bg: #0a0f16; --lvlup-panel: #131c28; 
            --lvlup-accent: #00ffcc; --lvlup-text: #f8fafc; 
            --lvlup-text-muted: #64748b; --lvlup-danger: #ef4444; --lvlup-edit: #f59e0b; --lvlup-success: #10b981;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--lvlup-bg); color: var(--lvlup-text); margin: 0; padding: 40px 20px; }
        .container { max-width: 1300px; margin: 0 auto; display: none; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--lvlup-accent); padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { margin: 0; color: var(--lvlup-accent); }
        
        .grid-layout { display: grid; grid-template-columns: 1fr 2.5fr; gap: 20px; }
        .panel { background: var(--lvlup-panel); padding: 25px; border-radius: 12px; border: 1px solid #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 20px;}
        
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0 20px; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        input:focus, select:focus, textarea:focus { border-color: var(--lvlup-accent); outline: none; }
        
        .btn-primary { width: 100%; background: var(--lvlup-accent); color: #000; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px;}
        .btn-primary:hover { background: #00ccaa; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1e293b; vertical-align: top; }
        th { color: var(--lvlup-text-muted); text-transform: uppercase; font-size: 12px; }
        
        /* Action Buttons */
        .btn-approve { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--lvlup-success); color: var(--lvlup-success); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; margin-bottom: 5px; width: 100%; }
        .btn-approve:hover { background: var(--lvlup-success); color: white; }
        
        .btn-reject { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--lvlup-danger); color: var(--lvlup-danger); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; width: 100%; }
        .btn-reject:hover { background: var(--lvlup-danger); color: white; }

        .status-pill { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .status-pending { background: var(--lvlup-edit); color: #000; }
        .status-approved { background: var(--lvlup-success); color: #fff; }
        .status-disqualified { background: var(--lvlup-danger); color: #fff; }

        .roster-small { font-size: 11px; color: var(--lvlup-text-muted); list-style: none; padding: 0; margin: 5px 0 0 0; }
    </style>
</head>
<body>

    <div class="container" id="adminContent">
        <div class="header">
            <h1>NEXUS COMMAND</h1>
            <a href="dashboard.html" style="color: var(--lvlup-text-muted); text-decoration: none;">Exit to Dashboard</a>
        </div>

        <div class="grid-layout">
            <div>
                <div class="panel" style="border-color: #ef4444;">
                    <h2 style="margin-top: 0; color: #ef4444;">Deploy Broadcast</h2>
                    <input type="text" id="bcTeamA" placeholder="Team A">
                    <input type="text" id="bcTeamB" placeholder="Team B">
                    <input type="text" id="bcStreamLink" placeholder="YouTube Link">
                    <button class="btn-primary" style="background: #ef4444; color: white;" id="saveStreamBtn">Push Live</button>
                </div>

                <div class="panel">
                    <h2 id="formTitle">Deploy Tournament</h2>
                    <input type="hidden" id="tId">
                    <input type="text" id="tTitle" placeholder="Event Title">
                    <input type="date" id="tDate">
                    <input type="text" id="tPrize" placeholder="Prize Pool">
                    <select id="tStatus">
                        <option value="upcoming">Upcoming</option>
                        <option value="live">LIVE</option>
                        <option value="completed">Completed</option>
                    </select>
                    <textarea id="tDesc" placeholder="Description..." rows="3"></textarea>
                    <button class="btn-primary" id="saveTournamentBtn">Initialize Event</button>
                </div>
            </div>

            <div>
                <div class="panel" style="border-color: var(--lvlup-accent);">
                    <h2 style="margin-top: 0; color: var(--lvlup-accent);">Roster Approval Queue</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Team & Event</th>
                                <th>Roster (IGNs)</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="teamTableBody"><tr><td colspan="4">Scanning network for squads...</td></tr></tbody>
                    </table>
                </div>

                <div class="panel">
                    <h2>Broadcast Archive</h2>
                    <table>
                        <thead><tr><th>Matchup</th><th>Visibility</th><th>Action</th></tr></thead>
                        <tbody id="streamTableBody"></tbody>
                    </table>
                </div>

                <div class="panel">
                    <h2>Event Management</h2>
                    <table>
                        <thead><tr><th>Tournament</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody id="tourneyTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './firebase-setup.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { doc, getDoc, collection, deleteDoc, addDoc, updateDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const profile = await getDoc(doc(db, "users", user.uid));
                if (profile.exists() && profile.data().role === "admin") {
                    document.getElementById('adminContent').style.display = "block";
                    loadTournaments();
                    loadStreams();
                    loadTeams(); // NEW
                } else { window.location.replace("index.html"); }
            } else { window.location.replace("login.html"); }
        });

        // --- NEW: TEAM APPROVAL LOGIC ---
        function loadTeams() {
            onSnapshot(query(collection(db, "teams"), orderBy("createdAt", "desc")), (snapshot) => {
                const tbody = document.getElementById('teamTableBody');
                tbody.innerHTML = "";
                if (snapshot.empty) { tbody.innerHTML = "<tr><td colspan='4'>No teams registered yet.</td></tr>"; return; }

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    const statusClass = data.status === "Approved" ? "status-approved" : (data.status === "Disqualified" ? "status-disqualified" : "status-pending");
                    
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${data.teamName}</strong><br><span style="font-size:11px; color:var(--lvlup-accent)">${data.tournamentName}</span></td>
                            <td>
                                <ul class="roster-small">
                                    <li>• ${data.captain} (C)</li>
                                    <li>• ${data.roster[0]}</li>
                                    <li>• ${data.roster[1]}</li>
                                    <li>• ${data.roster[2]}</li>
                                    <li>• ${data.roster[3]}</li>
                                </ul>
                            </td>
                            <td><span class="status-pill ${statusClass}">${data.status || 'Pending'}</span></td>
                            <td>
                                <button class="btn-approve" onclick="updateTeamStatus('${id}', 'Approved')">Approve</button>
                                <button class="btn-reject" onclick="updateTeamStatus('${id}', 'Disqualified')">Bounce</button>
                            </td>
                        </tr>
                    `;
                });
            });
        }
        window.updateTeamStatus = async (id, newStatus) => {
            await updateDoc(doc(db, "teams", id), { status: newStatus });
        };

        // --- PREVIOUS CMS LOGIC (MINIFIED FOR SPACE) ---
        // Streams
        document.getElementById('saveStreamBtn').addEventListener('click', async () => {
            const tA = document.getElementById('bcTeamA').value; const tB = document.getElementById('bcTeamB').value; const sLink = document.getElementById('bcStreamLink').value;
            if(!tA || !tB || !sLink) return;
            await addDoc(collection(db, "streams"), { teamA: tA, teamB: tB, streamUrl: sLink, isHidden: false, createdAt: new Date().toISOString() });
            document.getElementById('bcTeamA').value = ''; document.getElementById('bcTeamB').value = ''; document.getElementById('bcStreamLink').value = '';
        });
        function loadStreams() {
            onSnapshot(query(collection(db, "streams"), orderBy("createdAt", "desc")), (snapshot) => {
                const tbody = document.getElementById('streamTableBody'); tbody.innerHTML = "";
                snapshot.forEach(d => {
                    tbody.innerHTML += `<tr><td>${d.data().teamA} vs ${d.data().teamB}</td><td>${d.data().isHidden ? 'Hidden' : 'Public'}</td><td><button onclick="delStream('${d.id}')">Del</button></td></tr>`;
                });
            });
        }
        window.delStream = async (id) => { if(confirm("Delete stream?")) await deleteDoc(doc(db, "streams", id)); };

        // Tournaments
        document.getElementById('saveTournamentBtn').addEventListener('click', async () => {
            const title = document.getElementById('tTitle').value; const date = document.getElementById('tDate').value; const prize = document.getElementById('tPrize').value; const status = document.getElementById('tStatus').value; const desc = document.getElementById('tDesc').value;
            await addDoc(collection(db, "tournaments"), { title, date, prizePool: prize, status, description: desc, isHidden: false, createdAt: new Date().toISOString() });
            document.getElementById('tTitle').value = ''; document.getElementById('tDate').value = '';
        });
        function loadTournaments() {
            onSnapshot(query(collection(db, "tournaments"), orderBy("createdAt", "desc")), (snapshot) => {
                const tbody = document.getElementById('tourneyTableBody'); tbody.innerHTML = "";
                snapshot.forEach(d => {
                    tbody.innerHTML += `<tr><td>${d.data().title}</td><td>${d.data().status}</td><td><button onclick="delT('${d.id}')">Del</button></td></tr>`;
                });
            });
        }
        window.delT = async (id) => { if(confirm("Delete event?")) await deleteDoc(doc(db, "tournaments", id)); };
    </script>
</body>
</html>
