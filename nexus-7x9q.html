<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVLUP | Nexus Control</title>
    <style>
        :root { 
            --lvlup-bg: #0a0f16; --lvlup-panel: #131c28; 
            --lvlup-accent: #00ffcc; --lvlup-text: #f8fafc; 
            --lvlup-text-muted: #64748b; --lvlup-danger: #ef4444;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--lvlup-bg); color: var(--lvlup-text); margin: 0; padding: 40px 20px; }
        
        .container { max-width: 1100px; margin: 0 auto; display: none; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--lvlup-accent); padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { margin: 0; color: var(--lvlup-accent); }
        
        .grid-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .panel { background: var(--lvlup-panel); padding: 25px; border-radius: 12px; border: 1px solid #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .panel-stack { display: flex; flex-direction: column; gap: 20px; }

        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0 20px; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        input:focus, select:focus, textarea:focus { border-color: var(--lvlup-accent); outline: none; }
        
        .btn-primary { width: 100%; background: var(--lvlup-accent); color: #000; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { background: #00ccaa; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1e293b; }
        th { color: var(--lvlup-text-muted); text-transform: uppercase; font-size: 12px; }
        
        .btn-danger { background: transparent; border: 1px solid var(--lvlup-danger); color: var(--lvlup-danger); padding: 6px 10px; border-radius: 4px; cursor: pointer; transition: 0.2s; font-size: 12px; font-weight: bold; }
        .btn-danger:hover { background: var(--lvlup-danger); color: white; }
        
        .btn-secondary { background: transparent; border: 1px solid var(--lvlup-text-muted); color: var(--lvlup-text); padding: 6px 10px; border-radius: 4px; cursor: pointer; transition: 0.2s; font-size: 12px; font-weight: bold; margin-right: 5px; }
        .btn-secondary:hover { border-color: var(--lvlup-accent); color: var(--lvlup-accent); }

        .role-badge { background: #1e293b; padding: 4px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; }
        .role-admin { color: var(--lvlup-accent); border: 1px solid var(--lvlup-accent); }
    </style>
</head>
<body>

    <div class="container" id="adminContent">
        <div class="header">
            <h1>NEXUS COMMAND</h1>
            <a href="dashboard.html" style="color: var(--lvlup-text-muted); text-decoration: none;">Exit to Dashboard</a>
        </div>

        <div class="grid-layout">
            <div>
                <div class="panel">
                    <h2>Deploy Tournament</h2>
                    <input type="text" id="tTitle" placeholder="Event Title (e.g. Season 3 Qualifiers)">
                    <input type="date" id="tDate">
                    <input type="text" id="tPrize" placeholder="Prize Pool (e.g. 10,000 Diamonds)">
                    <select id="tStatus">
                        <option value="upcoming">Status: Upcoming</option>
                        <option value="live">Status: LIVE</option>
                        <option value="completed">Status: Completed</option>
                    </select>
                    <textarea id="tDesc" placeholder="Tournament Rules & Description..." rows="5" style="resize: vertical;"></textarea>
                    
                    <button class="btn-primary" id="createTournamentBtn">Initialize Event</button>
                    <div id="tMessage" style="color: var(--lvlup-accent); margin-top: 10px; font-size: 14px;"></div>
                </div>
            </div>

            <div class="panel-stack">
                
                <div class="panel">
                    <h2>Event Management</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Tournament</th>
                                <th>Status</th>
                                <th>Visibility</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="tourneyTableBody">
                            <tr><td colspan="4">Decrypting network data...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="panel">
                    <h2>User Database Audit</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Captain Name</th>
                                <th>Role</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <tr><td colspan="3">Decrypting network data...</td></tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './firebase-setup.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        // Added updateDoc, onSnapshot, query, and orderBy here
        import { doc, getDoc, collection, getDocs, deleteDoc, addDoc, updateDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 1. Security Gate
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userProfile = await getDoc(doc(db, "users", user.uid));
                    if (userProfile.exists() && userProfile.data().role === "admin") {
                        document.getElementById('adminContent').style.display = "block";
                        loadUsers();
                        // Load tournaments when authorized
                        loadTournaments();
                    } else {
                        alert("SECURITY BREACH: Unauthorized Clearance.");
                        window.location.replace("index.html");
                    }
                } catch (error) {
                    console.error("Database connection error:", error);
                }
            } else {
                window.location.replace("login.html");
            }
        });

        // 2. Fetch Users
        async function loadUsers() {
            const tableBody = document.getElementById('userTableBody');
            tableBody.innerHTML = "";
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                querySnapshot.forEach((documentSnapshot) => {
                    const data = documentSnapshot.data();
                    const userId = documentSnapshot.id;
                    let roleClass = "role-badge";
                    if(data.role === "admin") roleClass += " role-admin";
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${data.name || 'Unknown'}</strong><br><span style="font-size: 11px; color: var(--lvlup-text-muted);">${data.email}</span></td>
                        <td><span class="${roleClass}">${data.role}</span></td>
                        <td><button class="btn-danger" onclick="deleteUser('${userId}')">Purge</button></td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                tableBody.innerHTML = `<tr><td colspan="3" style="color: red;">Error loading data.</td></tr>`;
            }
        }

        // 3. Purge User
        window.deleteUser = async (userId) => {
            if(confirm("WARNING: Are you sure you want to permanently erase this user's profile?")) {
                try {
                    await deleteDoc(doc(db, "users", userId));
                    loadUsers(); 
                } catch(error) { alert("ERROR: " + error.message); }
            }
        }

        // 4. Create Tournament
        document.getElementById('createTournamentBtn').addEventListener('click', async () => {
            const title = document.getElementById('tTitle').value;
            const date = document.getElementById('tDate').value;
            const prize = document.getElementById('tPrize').value;
            const status = document.getElementById('tStatus').value;
            const desc = document.getElementById('tDesc').value;
            const messageBox = document.getElementById('tMessage');

            if (!title || !date) {
                messageBox.style.color = "var(--lvlup-danger)";
                messageBox.innerText = "Error: Title and Date are required.";
                return;
            }

            messageBox.style.color = "var(--lvlup-accent)";
            messageBox.innerText = "Deploying to network...";

            try {
                await addDoc(collection(db, "tournaments"), {
                    title: title,
                    date: date,
                    prizePool: prize,
                    status: status,
                    description: desc,
                    isHidden: false, // Default to visible
                    createdAt: new Date().toISOString()
                });
                
                messageBox.innerText = "Event successfully initialized!";
                document.getElementById('tTitle').value = '';
                document.getElementById('tDate').value = '';
                document.getElementById('tPrize').value = '';
                document.getElementById('tDesc').value = '';
                setTimeout(() => { messageBox.innerText = ""; }, 3000);
            } catch (error) {
                messageBox.style.color = "var(--lvlup-danger)";
                messageBox.innerText = "ERROR: " + error.message;
            }
        });

        // 5. NEW: Real-time Event Management Listener
        function loadTournaments() {
            const tourneyQuery = query(collection(db, "tournaments"), orderBy("createdAt", "desc"));
            onSnapshot(tourneyQuery, (snapshot) => {
                const tableBody = document.getElementById('tourneyTableBody');
                tableBody.innerHTML = "";
                
                if (snapshot.empty) {
                    tableBody.innerHTML = `<tr><td colspan="4" style="color: var(--lvlup-text-muted);">No events found.</td></tr>`;
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const tId = docSnap.id;
                    const isHidden = data.isHidden || false; // Check boolean status
                    
                    const eyeIcon = isHidden ? "👁️ Unhide" : "🚫 Hide";
                    const visibilityHtml = isHidden ? "<span style='color: var(--lvlup-text-muted);'>Hidden</span>" : "<span style='color: var(--lvlup-accent);'>Public</span>";

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${data.title}</strong><br><span style="font-size: 11px; color: var(--lvlup-text-muted);">${data.date}</span></td>
                        <td><span class="role-badge" style="border-color: #334155;">${data.status}</span></td>
                        <td>${visibilityHtml}</td>
                        <td>
                            <button class="btn-secondary" onclick="toggleVisibility('${tId}', ${isHidden})">${eyeIcon}</button>
                            <button class="btn-danger" onclick="deleteTournament('${tId}')">Purge</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            });
        }

        // 6. NEW: Toggle Hide/Unhide Function
        window.toggleVisibility = async (id, currentHiddenState) => {
            try {
                await updateDoc(doc(db, "tournaments", id), {
                    isHidden: !currentHiddenState // Flips the true/false value
                });
            } catch (error) {
                alert("Database Error: " + error.message);
            }
        }

        // 7. NEW: Delete Tournament Function
        window.deleteTournament = async (id) => {
            if(confirm("WARNING: This will permanently delete the event from the database. Continue?")) {
                try {
                    await deleteDoc(doc(db, "tournaments", id));
                } catch(error) {
                    alert("Database Error: " + error.message);
                }
            }
        }
    </script>
</body>
</html>
