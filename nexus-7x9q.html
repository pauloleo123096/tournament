<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVLUP | Nexus Control</title>
    <style>
        :root { 
            --lvlup-bg: #0a0f16; --lvlup-panel: #131c28; 
            --lvlup-accent: #00ffcc; --lvlup-text: #f8fafc; 
            --lvlup-text-muted: #64748b; --lvlup-danger: #ef4444; --lvlup-edit: #f59e0b;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--lvlup-bg); color: var(--lvlup-text); margin: 0; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: none; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--lvlup-accent); padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { margin: 0; color: var(--lvlup-accent); }
        
        .grid-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .panel { background: var(--lvlup-panel); padding: 25px; border-radius: 12px; border: 1px solid #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 20px;}
        
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0 20px; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        input:focus, select:focus, textarea:focus { border-color: var(--lvlup-accent); outline: none; }
        
        .btn-primary { width: 100%; background: var(--lvlup-accent); color: #000; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px;}
        .btn-primary:hover { background: #00ccaa; }
        .btn-edit-mode { background: var(--lvlup-edit); color: #000; }
        .btn-edit-mode:hover { background: #d97706; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1e293b; }
        th { color: var(--lvlup-text-muted); text-transform: uppercase; font-size: 12px; }
        
        .btn-danger { background: transparent; border: 1px solid var(--lvlup-danger); color: var(--lvlup-danger); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; margin-right: 5px;}
        .btn-danger:hover { background: var(--lvlup-danger); color: white; }
        
        .btn-secondary { background: transparent; border: 1px solid var(--lvlup-text-muted); color: var(--lvlup-text); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; margin-right: 5px; }
        .btn-secondary:hover { border-color: var(--lvlup-accent); color: var(--lvlup-accent); }

        .btn-action { background: transparent; border: 1px solid var(--lvlup-edit); color: var(--lvlup-edit); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; margin-right: 5px; }
        .btn-action:hover { background: var(--lvlup-edit); color: #000; }
    </style>
</head>
<body>

    <div class="container" id="adminContent">
        <div class="header">
            <h1>NEXUS COMMAND</h1>
            <a href="dashboard.html" style="color: var(--lvlup-text-muted); text-decoration: none;">Exit to Dashboard</a>
        </div>

        <div class="grid-layout">
            <div>
                <div class="panel" style="border-color: #ef4444;">
                    <h2 style="margin-top: 0; color: #ef4444;">Deploy Broadcast</h2>
                    <input type="text" id="bcTeamA" placeholder="Team A Name">
                    <input type="text" id="bcTeamB" placeholder="Team B Name">
                    <input type="text" id="bcStreamLink" placeholder="YouTube Link (e.g. https://youtu.be/...)">
                    <button class="btn-primary" style="background: #ef4444; color: white;" id="saveStreamBtn">Push to Network</button>
                    <div id="bcMessage" style="font-size: 14px; margin-top: 10px;"></div>
                </div>

                <div class="panel" id="tournamentFormPanel">
                    <h2 id="formTitle">Deploy Tournament</h2>
                    <input type="hidden" id="tId">
                    <input type="text" id="tTitle" placeholder="Event Title (e.g. Season 3 Qualifiers)">
                    <input type="date" id="tDate">
                    <input type="text" id="tPrize" placeholder="Prize Pool (e.g. 10,000 Diamonds)">
                    <select id="tStatus">
                        <option value="upcoming">Status: Upcoming</option>
                        <option value="live">Status: LIVE</option>
                        <option value="completed">Status: Completed</option>
                    </select>
                    <textarea id="tDesc" placeholder="Tournament Rules & Description..." rows="5"></textarea>
                    
                    <button class="btn-primary" id="saveTournamentBtn">Initialize Event</button>
                    <button class="btn-secondary" id="cancelEditBtn" style="display: none; width: 100%;">Cancel Edit</button>
                    <div id="tMessage" style="font-size: 14px; margin-top: 10px;"></div>
                </div>
            </div>

            <div>
                <div class="panel">
                    <h2 style="margin-top: 0; color: #ef4444;">Broadcast Management</h2>
                    <table>
                        <thead>
                            <tr><th>Matchup</th><th>Visibility</th><th>Action</th></tr>
                        </thead>
                        <tbody id="streamTableBody"><tr><td colspan="3">Loading...</td></tr></tbody>
                    </table>
                </div>

                <div class="panel">
                    <h2>Event Management</h2>
                    <table>
                        <thead>
                            <tr><th>Tournament</th><th>Status</th><th>Visibility</th><th>Action</th></tr>
                        </thead>
                        <tbody id="tourneyTableBody"><tr><td colspan="4">Loading...</td></tr></tbody>
                    </table>
                </div>

                <div class="panel">
                    <h2>User Audit</h2>
                    <table>
                        <thead>
                            <tr><th>Captain Name</th><th>Role</th><th>Action</th></tr>
                        </thead>
                        <tbody id="userTableBody"><tr><td colspan="3">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './firebase-setup.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { doc, getDoc, collection, getDocs, deleteDoc, addDoc, updateDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        let isEditMode = false;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const profile = await getDoc(doc(db, "users", user.uid));
                if (profile.exists() && profile.data().role === "admin") {
                    document.getElementById('adminContent').style.display = "block";
                    loadUsers();
                    loadTournaments();
                    loadStreams(); // NEW
                } else {
                    window.location.replace("index.html");
                }
            } else {
                window.location.replace("login.html");
            }
        });

        // --- NEW: STREAM CMS LOGIC ---
        document.getElementById('saveStreamBtn').addEventListener('click', async () => {
            const tA = document.getElementById('bcTeamA').value;
            const tB = document.getElementById('bcTeamB').value;
            const sLink = document.getElementById('bcStreamLink').value;
            const msg = document.getElementById('bcMessage');
            
            if(!tA || !tB || !sLink) { msg.style.color="red"; msg.innerText="All fields required."; return; }
            
            try {
                await addDoc(collection(db, "streams"), { teamA: tA, teamB: tB, streamUrl: sLink, isHidden: false, createdAt: new Date().toISOString() });
                msg.style.color = "var(--lvlup-accent)"; msg.innerText = "Stream Pushed to Network!";
                document.getElementById('bcTeamA').value = ''; document.getElementById('bcTeamB').value = ''; document.getElementById('bcStreamLink').value = '';
                setTimeout(() => msg.innerText = "", 3000);
            } catch (e) { msg.style.color = "red"; msg.innerText = "Error: " + e.message; }
        });

        function loadStreams() {
            onSnapshot(query(collection(db, "streams"), orderBy("createdAt", "desc")), (snapshot) => {
                const tbody = document.getElementById('streamTableBody'); tbody.innerHTML = "";
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${data.teamA} vs ${data.teamB}</strong></td>
                            <td>${data.isHidden ? "<span style='color:red;'>Hidden</span>" : "<span style='color:#00ffcc;'>Public</span>"}</td>
                            <td>
                                <button class="btn-secondary" onclick="toggleStreamVis('${docSnap.id}', ${data.isHidden})">${data.isHidden ? "Unhide" : "Hide"}</button>
                                <button class="btn-danger" onclick="delStream('${docSnap.id}')">Purge</button>
                            </td>
                        </tr>
                    `;
                });
            });
        }
        window.toggleStreamVis = async (id, isHidden) => await updateDoc(doc(db, "streams", id), { isHidden: !isHidden });
        window.delStream = async (id) => { if(confirm("Permanently delete stream?")) await deleteDoc(doc(db, "streams", id)); }


        // --- TOURNAMENT CMS LOGIC ---
        document.getElementById('saveTournamentBtn').addEventListener('click', async () => {
            const id = document.getElementById('tId').value; const title = document.getElementById('tTitle').value; const date = document.getElementById('tDate').value; const prize = document.getElementById('tPrize').value; const status = document.getElementById('tStatus').value; const desc = document.getElementById('tDesc').value; const msg = document.getElementById('tMessage');
            if (!title || !date) { msg.style.color = "red"; msg.innerText = "Title and Date required."; return; }
            msg.style.color = "var(--lvlup-accent)"; msg.innerText = "Processing...";
            try {
                if (isEditMode) {
                    await updateDoc(doc(db, "tournaments", id), { title, date, prizePool: prize, status, description: desc });
                    msg.innerText = "Event Updated!"; exitEditMode();
                } else {
                    await addDoc(collection(db, "tournaments"), { title, date, prizePool: prize, status, description: desc, isHidden: false, createdAt: new Date().toISOString() });
                    msg.innerText = "Event Deployed!"; clearForm();
                }
                setTimeout(() => msg.innerText = "", 3000);
            } catch (e) { msg.style.color = "red"; msg.innerText = "Error: " + e.message; }
        });

        function loadTournaments() {
            onSnapshot(query(collection(db, "tournaments"), orderBy("createdAt", "desc")), (snapshot) => {
                const tbody = document.getElementById('tourneyTableBody'); tbody.innerHTML = "";
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data(); const id = docSnap.id;
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${data.title}</strong><br><span style="font-size: 11px;">${data.date}</span></td>
                            <td>${data.status}</td>
                            <td>${data.isHidden ? "<span style='color:red;'>Hidden</span>" : "<span style='color:#00ffcc;'>Public</span>"}</td>
                            <td>
                                <button class="btn-action" onclick="editEvent('${id}', '${data.title.replace(/'/g, "\\'")}', '${data.date}', '${data.prizePool || ''}', '${data.status}', '${(data.description || '').replace(/'/g, "\\'").replace(/\n/g, "\\n")}')">Edit</button>
                                <button class="btn-secondary" onclick="toggleVis('${id}', ${data.isHidden})">${data.isHidden ? "Unhide" : "Hide"}</button>
                                <button class="btn-danger" onclick="delEvent('${id}')">Purge</button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        window.editEvent = (id, title, date, prize, status, desc) => {
            isEditMode = true; document.getElementById('formTitle').innerText = "Update Event Data"; document.getElementById('formTitle').style.color = "var(--lvlup-edit)"; document.getElementById('saveTournamentBtn').innerText = "Submit Update"; document.getElementById('saveTournamentBtn').classList.add("btn-edit-mode"); document.getElementById('cancelEditBtn').style.display = "block";
            document.getElementById('tId').value = id; document.getElementById('tTitle').value = title; document.getElementById('tDate').value = date; document.getElementById('tPrize').value = prize; document.getElementById('tStatus').value = status; document.getElementById('tDesc').value = desc; window.scrollTo(0, 0);
        }
        document.getElementById('cancelEditBtn').addEventListener('click', exitEditMode);
        function exitEditMode() {
            isEditMode = false; document.getElementById('formTitle').innerText = "Deploy Tournament"; document.getElementById('formTitle').style.color = "var(--lvlup-accent)"; document.getElementById('saveTournamentBtn').innerText = "Initialize Event"; document.getElementById('saveTournamentBtn').classList.remove("btn-edit-mode"); document.getElementById('cancelEditBtn').style.display = "none"; clearForm();
        }
        function clearForm() {
            document.getElementById('tId').value = ''; document.getElementById('tTitle').value = ''; document.getElementById('tDate').value = ''; document.getElementById('tPrize').value = ''; document.getElementById('tDesc').value = '';
        }
        window.toggleVis = async (id, isHidden) => await updateDoc(doc(db, "tournaments", id), { isHidden: !isHidden });
        window.delEvent = async (id) => { if(confirm("Permanently delete?")) await deleteDoc(doc(db, "tournaments", id)); }

        // --- USER AUDIT LOGIC ---
        async function loadUsers() {
            const tbody = document.getElementById('userTableBody'); tbody.innerHTML = "";
            (await getDocs(collection(db, "users"))).forEach(d => {
                tbody.innerHTML += `<tr><td><strong>${d.data().name}</strong><br><span style="font-size:11px;">${d.data().email}</span></td><td>${d.data().role}</td><td><button class="btn-danger" onclick="delUser('${d.id}')">Purge</button></td></tr>`;
            });
        }
        window.delUser = async (id) => { if(confirm("Purge user?")) { await deleteDoc(doc(db, "users", id)); loadUsers(); } }
    </script>
</body>
</html>
