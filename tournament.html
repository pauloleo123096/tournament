<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVLUP | Event Details</title>
    <style>
        :root { 
            --lvlup-bg: #0a0f16; --lvlup-panel: #131c28; 
            --lvlup-accent: #00ffcc; --lvlup-text: #f8fafc; 
            --lvlup-text-muted: #64748b; --lvlup-nav: #05080c;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--lvlup-bg); color: var(--lvlup-text); margin: 0; }
        
        nav { background: var(--lvlup-nav); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--lvlup-accent); }
        .logo { font-size: 24px; font-weight: bold; color: var(--lvlup-accent); text-decoration: none; letter-spacing: 2px; }
        .nav-links a { color: var(--lvlup-text); text-decoration: none; margin-left: 20px; font-weight: bold; }
        
        .container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        
        .details-panel { background: var(--lvlup-panel); padding: 40px; border-radius: 12px; border: 1px solid #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .details-panel h1 { margin-top: 0; font-size: 36px; color: #fff; }
        
        .meta-info { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #1e293b; padding-bottom: 20px; }
        .meta-item { color: var(--lvlup-text-muted); }
        .meta-item span { color: var(--lvlup-accent); font-weight: bold; display: block; margin-top: 5px; font-size: 18px;}
        
        .description-box { line-height: 1.6; font-size: 16px; margin-bottom: 40px; white-space: pre-wrap; }
        
        .btn-register { display: block; width: 100%; text-align: center; background: var(--lvlup-accent); color: #000; padding: 15px; border-radius: 6px; font-size: 18px; font-weight: bold; text-decoration: none; transition: 0.2s; box-sizing: border-box;}
        .btn-register:hover { background: #00ccaa; transform: translateY(-2px); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">LVLUP</a>
        <div class="nav-links">
            <a href="index.html">← Back to Home</a>
        </div>
    </nav>

    <div class="container">
        <div class="details-panel" id="contentBox">
            <h2 style="color: var(--lvlup-text-muted);">Decrypting network data...</h2>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-setup.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 1. Get the Tournament ID from the URL (e.g., ?id=XYZ123)
        const urlParams = new URLSearchParams(window.location.search);
        const tourneyId = urlParams.get('id');
        const contentBox = document.getElementById('contentBox');

        if (!tourneyId) {
            contentBox.innerHTML = "<h2 style='color: red;'>Error: Invalid Deployment Data.</h2><p>No tournament ID provided.</p>";
        } else {
            // 2. Fetch the specific tournament from Firestore
            fetchTournament(tourneyId);
        }

        async function fetchTournament(id) {
            try {
                const docRef = doc(db, "tournaments", id);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // 3. Render the UI
                    contentBox.innerHTML = `
                        <h1>${data.title}</h1>
                        <div class="meta-info">
                            <div class="meta-item">Date <span>${data.date}</span></div>
                            <div class="meta-item">Prize Pool <span>${data.prizePool}</span></div>
                            <div class="meta-item">Status <span style="color: ${data.status === 'live' ? '#ef4444' : 'var(--lvlup-accent)'}; text-transform: uppercase;">${data.status}</span></div>
                        </div>
                        
                        <h3 style="color: var(--lvlup-accent); margin-bottom: 10px;">Rules & Information</h3>
                        <div class="description-box">${data.description || "No description provided for this event."}</div>
                        
                        <a href="register.html" class="btn-register">Register Squad for this Event</a>
                    `;
                } else {
                    contentBox.innerHTML = "<h2 style='color: red;'>Error: Event Not Found.</h2><p>This tournament may have been purged from the network.</p>";
                }
            } catch (error) {
                console.error("Database Error:", error);
                contentBox.innerHTML = "<h2 style='color: red;'>Connection Error</h2><p>Failed to retrieve data from the server.</p>";
            }
        }
    </script>
</body>
</html>
