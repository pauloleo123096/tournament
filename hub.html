<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVLUP MLBB Tournament Hub</title>
    <style>
        :root { 
            --lvlup-bg: #0a0f16; --lvlup-panel: #131c28; 
            --lvlup-accent: #00ffcc; --lvlup-text: #f8fafc; 
            --lvlup-text-muted: #64748b; --lvlup-danger: #ef4444; 
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--lvlup-bg); color: var(--lvlup-text); margin: 0; padding: 20px; }
        
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); border: 1px solid #1e293b; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .panel { background-color: var(--lvlup-panel); padding: 20px; border-radius: 12px; border-top: 4px solid var(--lvlup-accent); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3); }
        h2, h3 { margin-top: 0; }
        
        .live-badge { background-color: var(--lvlup-danger); color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; animation: pulse 2s infinite; margin-left: 10px; vertical-align: middle; }
        .match-up { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; font-size: 24px; font-weight: bold; }
        .team { flex: 1; text-align: center; }
        .vs { color: var(--lvlup-text-muted); font-size: 18px; }
        .score { font-size: 48px; color: var(--lvlup-accent); text-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        @media (min-width: 900px) { .container { grid-template-columns: 2fr 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-content">
            <h2>LVLUP MLBB Invitational</h2>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/live_stream?channel=YOUR_CHANNEL_ID" allowfullscreen></iframe>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <a href="index.html" style="color: var(--lvlup-accent); text-decoration: none; font-size: 14px; display: block; margin-bottom: 15px;">← Back to Home</a>
                <h3>Current Match <span class="live-badge">LIVE</span></h3>
                <p id="gamePhase" style="color: var(--lvlup-text-muted); margin: 0; font-style: italic;">Connecting to arena...</p>
                
                <div class="match-up">
                    <div class="team">
                        <div id="team1Name">Team A</div>
                        <div class="score" id="team1Score">0</div>
                    </div>
                    <div class="vs">VS</div>
                    <div class="team">
                        <div id="team2Name">Team B</div>
                        <div class="score" id="team2Score">0</div>
                    </div>
                </div>
            </div>

            <div class="panel" style="margin-top: 20px;">
                <h3>Live Leaderboard</h3>
                <p style="color: var(--lvlup-text-muted); font-size: 14px;">(Standings module pending...)</p>
            </div>
        </div>
    </div>

    <script type="module">
      import { db } from './firebase-setup.js';
      import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

      const matchRef = doc(db, "matches", "grand_finals");
      
      onSnapshot(matchRef, (snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.data();
          document.getElementById("team1Name").innerText = data.player1;
          document.getElementById("team2Name").innerText = data.player2;
          document.getElementById("team1Score").innerText = data.score_p1;
          document.getElementById("team2Score").innerText = data.score_p2;
          document.getElementById("gamePhase").innerText = "Status: " + data.status;
        } else {
          document.getElementById("gamePhase").innerText = "Awaiting match data...";
        }
      });
    </script>
</body>
</html>
