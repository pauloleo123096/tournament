<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVLUP | Broadcast Hub</title>
    <style>
        :root { --lvlup-bg: #0a0f16; --lvlup-panel: #131c28; --lvlup-accent: #00ffcc; --lvlup-text: #f8fafc; --lvlup-text-muted: #64748b; --lvlup-nav: #05080c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--lvlup-bg); color: var(--lvlup-text); margin: 0; }
        nav { background: var(--lvlup-nav); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--lvlup-accent); }
        .logo { font-size: 24px; font-weight: bold; color: var(--lvlup-accent); text-decoration: none; letter-spacing: 2px; }
        .nav-links a { color: var(--lvlup-text); text-decoration: none; margin-left: 20px; font-weight: bold; }
        .nav-links a:hover { color: var(--lvlup-accent); }
        
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        /* Stream Card Styling */
        .stream-card { background: var(--lvlup-panel); border-radius: 12px; border: 1px solid #1e293b; overflow: hidden; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .scoreboard { padding: 20px 40px; border-bottom: 1px solid #ef4444; display: flex; justify-content: space-between; align-items: center; background: #0f172a; }
        .team-name { font-size: 24px; font-weight: bold; width: 40%; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center;}
        .vs-badge { background: #ef4444; color: white; padding: 6px 12px; border-radius: 6px; font-size: 16px; font-weight: bold; }
        
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">LVLUP</a>
        <div class="nav-links"><a href="index.html">← Back to Home</a></div>
    </nav>

    <div class="container" id="streamGrid">
        <p style="text-align: center; color: var(--lvlup-text-muted);">Decrypting network streams...</p>
    </div>

    <script type="module">
        import { db } from './firebase-setup.js';
        import { collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        function formatYouTubeUrl(url) {
            if (!url) return null;
            let videoId = "";
            if (url.includes("youtu.be/")) videoId = url.split("youtu.be/")[1]?.split("?")[0];
            else if (url.includes("watch?v=")) videoId = url.split("watch?v=")[1]?.split("&")[0];
            else if (url.includes("/live/")) videoId = url.split("/live/")[1]?.split("?")[0];
            else if (url.includes("embed/")) return url; 
            return videoId ? `https://www.youtube.com/embed/${videoId}?autoplay=0` : null;
        }

        const grid = document.getElementById("streamGrid");
        const streamQuery = query(collection(db, "streams"), orderBy("createdAt", "desc"));
        
        onSnapshot(streamQuery, (snapshot) => {
            grid.innerHTML = ""; // Clear loading text
            
            let hasVisibleStreams = false;

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                
                // Skip rendering if you clicked "Hide" in the Nexus
                if (data.isHidden === true) return; 
                
                hasVisibleStreams = true;
                const embedUrl = formatYouTubeUrl(data.streamUrl);
                
                grid.innerHTML += `
                    <div class="stream-card">
                        <div class="scoreboard">
                            <div class="team-name">${data.teamA}</div>
                            <div class="vs-badge">LIVE</div>
                            <div class="team-name">${data.teamB}</div>
                        </div>
                        <div class="video-container">
                            ${embedUrl ? `<iframe src="${embedUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>` : `<div style="padding: 40px; text-align: center; color: red;">Invalid Stream URL provided.</div>`}
                        </div>
                    </div>
                `;
            });

            if (!hasVisibleStreams) {
                grid.innerHTML = '<div style="text-align: center; padding: 60px; background: var(--lvlup-panel); border-radius: 12px; border: 1px solid #1e293b;"><h2 style="color: var(--lvlup-text-muted);">Network Offline</h2><p style="color: var(--lvlup-text-muted);">No live broadcasts at this time.</p></div>';
            }
        });
    </script>
</body>
</html>
