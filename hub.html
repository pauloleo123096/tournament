<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVLUP | Live Broadcast</title>
    <style>
        :root { 
            --lvlup-bg: #0a0f16; --lvlup-panel: #131c28; 
            --lvlup-accent: #00ffcc; --lvlup-text: #f8fafc; 
            --lvlup-text-muted: #64748b; --lvlup-nav: #05080c;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--lvlup-bg); color: var(--lvlup-text); margin: 0; }
        
        /* Navbar */
        nav { background: var(--lvlup-nav); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--lvlup-accent); }
        .logo { font-size: 24px; font-weight: bold; color: var(--lvlup-accent); text-decoration: none; letter-spacing: 2px; }
        .nav-links a { color: var(--lvlup-text); text-decoration: none; margin-left: 20px; font-weight: bold; }
        .nav-links a:hover { color: var(--lvlup-accent); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        /* Scoreboard Panel */
        .scoreboard { background: var(--lvlup-panel); padding: 20px 40px; border-radius: 12px; border: 1px solid #ef4444; text-align: center; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .team-name { font-size: 28px; font-weight: bold; width: 40%; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .vs-badge { background: #ef4444; color: white; padding: 8px 16px; border-radius: 8px; font-size: 18px; font-weight: bold; }
        
        /* Video Player Container */
        .video-container { position: relative; padding-bottom: 56.25%; /* 16:9 Aspect Ratio */ height: 0; overflow: hidden; border-radius: 12px; border: 1px solid #1e293b; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .waiting-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--lvlup-text-muted); text-align: center; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">LVLUP</a>
        <div class="nav-links">
            <a href="index.html">← Back to Home</a>
        </div>
    </nav>

    <div class="container">
        <div class="scoreboard">
            <div class="team-name" id="teamA">Waiting for Network...</div>
            <div class="vs-badge">🔴 LIVE</div>
            <div class="team-name" id="teamB">Waiting for Network...</div>
        </div>

        <div class="video-container" id="streamContainer">
            <div class="waiting-msg" id="streamStatus">
                <h2>Broadcast Offline</h2>
                <p>Waiting for the Admin to push the live stream link.</p>
            </div>
            <iframe id="ytPlayer" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="display: none;"></iframe>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-setup.js';
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Upgraded YouTube Link Extractor
        function formatYouTubeUrl(url) {
            if (!url) return null;
            let videoId = "";
            if (url.includes("youtu.be/")) {
                videoId = url.split("youtu.be/")[1]?.split("?")[0];
            } else if (url.includes("watch?v=")) {
                videoId = url.split("watch?v=")[1]?.split("&")[0];
            } else if (url.includes("/live/")) {
                videoId = url.split("/live/")[1]?.split("?")[0];
            } else if (url.includes("embed/")) {
                return url; 
            }
            return videoId ? `https://www.youtube.com/embed/${videoId}?autoplay=1` : null;
        }

        // Listen for real-time changes from the Nexus
        const matchRef = doc(db, "matches", "grand_finals");
        
        onSnapshot(matchRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.data();
                
                // 1. Update the Scoreboard
                document.getElementById("teamA").innerText = data.player1 || "TBD";
                document.getElementById("teamB").innerText = data.player2 || "TBD";
                
                // 2. Update the Video Player
                const ytPlayer = document.getElementById("ytPlayer");
                const statusMsg = document.getElementById("streamStatus");
                const embedUrl = formatYouTubeUrl(data.streamUrl);

                if (embedUrl) {
                    if (ytPlayer.src !== embedUrl) {
                        ytPlayer.src = embedUrl;
                    }
                    ytPlayer.style.display = "block";
                    statusMsg.style.display = "none";
                } else {
                    ytPlayer.style.display = "none";
                    ytPlayer.src = "";
                    statusMsg.style.display = "block";
                }
            }
        });
    </script>
</body>
</html>
